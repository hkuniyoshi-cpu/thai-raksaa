<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with subtle rounding -->
  <rect width="32" height="32" rx="4" fill="#1A1A1A"/>
  <!-- Lotus petals: top -->
  <ellipse cx="16" cy="9.5" rx="3.5" ry="7" fill="#C9A84C"/>
  <!-- Lotus petals: bottom -->
  <ellipse cx="16" cy="22.5" rx="3.5" ry="7" fill="#C9A84C"/>
  <!-- Lotus petals: left -->
  <ellipse cx="9.5" cy="16" rx="7" ry="3.5" fill="#C9A84C"/>
  <!-- Lotus petals: right -->
  <ellipse cx="22.5" cy="16" rx="7" ry="3.5" fill="#C9A84C"/>
  <!-- Center: dark cutout -->
  <circle cx="16" cy="16" r="4" fill="#1A1A1A"/>
  <!-- Center: gold dot -->
  <circle cx="16" cy="16" r="2.2" fill="#C9A84C"/>
</svg>
